layerrule = blur on, ignore_alpha 0, xray 0, match:namespace rofi
layerrule = blur on, ignore_alpha 0, match:namespace waybar
layerrule = blur on, ignore_alpha 0, match:namespace topbar
#layerrule = xray 1, waybar
layerrule = blur on, ignore_alpha 0, match:namespace notification

# for use with my waybar config
#windowrulev2 = noshadow, class:^(kitty)$, floating:0

# TODO: Make class "MPLAB X IDE v6.20" tile instead of float

windowrule = immediate on, match:class ^(cs2)$
windowrule = immediate on, match:class ^(steam_app_322170)$ # Geometry Dash
windowrule = immediate on, match:class ^(steam_app_1139900)$ # Ghostrunner
windowrule = immediate on, match:class ^(steam_app_2144740)$ # Ghostrunner 2
windowrule = immediate on, match:class ^(steam_app_264710)$ # Subnautica
windowrule = immediate on, match:class ^(steam_app_387290)$ # Ori and the Blind Forest DE
windowrule = immediate on, match:class ^(steam_app_1057090)$ # Ori and the Will of the Wisps
windowrule = immediate on, match:class ^(Celeste.bin.x86_64)$ # Celeste
windowrule = immediate on, match:class ^(hl_linux)$ # Half Life 1
windowrule = immediate on, match:class ^(hl2_linux)$ # Half Life 2

# Smart gaps
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule = border_size 0, rounding 0, match:float 0, match:workspace w[tv1]
windowrule = border_size 0, rounding 0, match:float 0, match:workspace f[1]

windowrule = rounding 0, match:fullscreen 1

# windowrule = float,^(zenity)$
# windowrule = float,^(yad)$

windowrule = workspace 1, match:class ^(codium-url-handler)$
windowrule = workspace 1, match:class ^(VSCodium)$
windowrule = workspace 1, match:class ^(vscodium)$
windowrule = workspace 1, match:class ^(code-oss-url-handler)$
windowrule = workspace 1, match:class ^(code-oss)$
windowrule = workspace 1, match:class ^(codium)$

windowrule = workspace 2, match:class ^(LibreWolf)$
# windowrulev2 = workspace 2, class:^(thorium-browser)$
windowrule = workspace 2, match:class ^(floorp)$
windowrule = workspace 2, match:class ^(one.ablaze.floorp)$

windowrule = workspace 3, match:class ^(brave-browser)$
windowrule = workspace 3, match:class ^(Brave-browser)$
# windowrulev2 = workspace 3, class:^(firefoxdeveloperedition)$

windowrule = workspace 4, match:class ^(org.mozilla.firefox)$

windowrule = workspace 5, match:class ^(steam)$
windowrule = workspace 5, float on, match:class ^()$, match:title ^(Steam)$
windowrule = workspace 5, match:class ^(org.prismlauncher.PrismLauncher)$

windowrule = workspace 6, match:class ^(discord)$
windowrule = workspace 6, match:class ^(vesktop)$
windowrule = workspace 6, match:class ^(Vesktop)$
windowrule = workspace 6, match:class ^(WebCord)$

# put wayland-on-wayland compositors where the sun don't shine
windowrule = workspace 12, match:class ^(wlroots)$

windowrule = float on, match:class ^(xfce-polkit)$
windowrule = float on, match:class ^(flameshot)$
windowrule = move (0) (0), match:title ^(flameshot)
# windowrulev2 = nofullscreenrequest,title:^(flameshot)
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(pavucontrol-qt)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(galculator)$
windowrule = float on, match:class ^(org.gnome.Calculator)$
windowrule = float on, match:class ^(app.drey.EarTag)$
windowrule = float on, match:class ^(net.davidotek.pupgui2)$
windowrule = float on, match:class ^(kvantummanager)$
windowrule = float on, match:class ^(xdg-desktop-portal-gnome)$
windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = float on, match:class ^(xdg-desktop-portal)$
windowrule = float on, match:class ^(file-roller)$
windowrule = float on, match:class ^(org.gnome.FileRoller)$
windowrule = float on, rounding 30, match:class ^(re.sonny.Junction)$

windowrule = float on, match:class ^(thunar)$, match:title ^(File Operation Progress)$
windowrule = float on, match:class ^(thunar)$, match:title ^(Bulk Rename - Rename Multiple Files)$

windowrule = float on, match:class ^(nemo)$, match:title ^(.*)( Properties)$ # opening folder 'foo Properties' makes a floating window

windowrule = float on, match:class ^(python3)$, match:title ^(firewall-applet)$
windowrule = float on, match:class ^(python3)$, match:title ^(About Firewall Applet)$
windowrule = float on, match:class ^(python3)$, match:title ^(Configure Shields Up/Down Zones)$
windowrule = float on, match:class ^(org.kde.okular)$, match:title ^(New Text Note — Okular)$
windowrule = float on, size (monitor_w*0.2) (monitor_h*0.6), match:class ^(io.bassi.Amberol)$
windowrule = float on, match:class ^(java)$, match:title ^(Loading...)$

windowrule = float on, pin on, match:class ^(firefox)$, match:title ^(Picture-in-Picture)$
windowrule = float on, pin on, match:class ^(org.mozilla.firefox)$, match:title ^(Picture-in-Picture)$
windowrule = float on, pin on, match:class ^()$, match:title ^(Picture in picture)$
# windowrulev2 = float, initialClass:^(firefox)$,title:^(Picture-in-Picture)$
# windowrulev2 = pin, initialClass:^(firefox)$,title:^(Picture-in-Picture)$

windowrule = opacity 0.0 override 0.0 override, no_anim on, no_focus on, no_initial_focus on, match:class ^(xwaylandvideobridge)$

windowrule = pin on, match:class ^(XEyes)$

windowrule = workspace special:scratchpad, float on, match:class ^(__scratchpad__)$
windowrule = float on, xray 0, dim_around on, size (monitor_w*0.8) (monitor_h*0.8), center 1, match:class ^(hdropkitty)$
#windowrulev2 = pin, class:^(hdropkitty)$
#windowrulev2 = stayfocused, class:^(hdropkitty)$

windowrule = float on, match:class ^(steam)$, match:title ^(Friends List)$
windowrule = float on, match:class ^(steam)$, match:title ^(Steam Settings)$
windowrule = float on, match:class ^(steam)$, match:title ^(Add Non-Steam Game)$

windowrule = float on, match:class ^(thunar)$, match:initial_title ^(Rename \")([^\"]*)(\")$
